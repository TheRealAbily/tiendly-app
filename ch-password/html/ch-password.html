<!DOCTYPE html>
    <html lang="es">
        <head>
            <!-- Title -->
            <title>Cambiar contraseña</title>

            <!-- Icon -->
            <link rel="icon" href="../../resources/images/tiendly-icon.ico">

            <!-- CSS -->

            <!-- Main general -->
            <link href="../../general/css/vars.css" rel="stylesheet">
            <link href="../../general/css/fonts.css" rel="stylesheet">
            <link href="../../general/css/html.css" rel="stylesheet">
            <link href="../../general/css/styles.css" rel="stylesheet">

            <!-- General -->
            <link href="../css/styles.css" rel="stylesheet">
            <link href="../css/form.css" rel="stylesheet">

            <!-- JS -->

            <!-- Main general -->
            <script src="../../general/js/imports/header.js" type="module" prefer></script>
            
            <!-- General -->
            <script src="../js/change-password.js" type="module" prefer></script>

            <!-- Meta -->
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        </head>

        <body>
            <!-- Import the header -->
            <header></header>

            <!-- Change password -->
            <main>
                <form class="fade-in">
                    <!-- Text -->
                    <h2>Cambiar contraseña</h2>

                    <!-- Current password -->
                    <div class="this no-touch input-container">
                        <input type="password" id="current-password" autocomplete="off">
                        <label class="input-label">Contraseña actual</label>
                        <i class="password hide"></i>
                    </div>

                    <!-- New password -->
                    <div class="this no-touch input-container">
                        <input type="password" id="new-password" autocomplete="off">
                        <label class="input-label">Nueva contraseña</label>
                        <i class="password hide"></i>
                    </div>

                    <!-- New repassword -->
                    <div class="this no-touch input-container last">
                        <input type="password" id="new-repassword" autocomplete="off">
                        <label class="input-label">Repetir contraseña</label>
                        <i class="password hide"></i>
                    </div>

                    <!-- Line password -->
                    <div class="line-password">
                        <span id="line"></span>
                    </div>

                    <!-- Error text -->
                    <h6 class="error-text" id="error-text">Ha ocurrido un error en el servidor</h6>

                    <!-- Button -->
                    <button class="this no-touch disabled" type="submit" id="change-button">Cambiar</button>
                </form>
            </main>
        </body>
    </html>
